server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    # TODO: security — move DB credentials to environment variables (e.g. ${DB_USERNAME}, ${DB_PASSWORD})
    url: jdbc:mysql://localhost:3306/property_management?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 200558
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  redis:
    host: localhost
    port: 6379
    password:
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# JWT
# TODO: security — move jwt.secret to environment variable (e.g. ${JWT_SECRET})
# and never commit real secrets to version control.
jwt:
  secret: PROPERTY_MGMT_SECRET_KEY_2024_CHANGE_IN_PROD
  expiration: 86400000  # 24小时

# 文件上传
file:
  upload:
    path: /data/property/uploads/
    max-size: 10485760  # 10MB

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.property: debug
    org.springframework.security: warn
